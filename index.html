<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tech Tutorials</title>
    <meta name="description" content="Tech Tutorials — comprehensive AI, ML, and programming learning resources with interview prep." />
    <style>
      /* Loading skeleton - shown immediately */
      #loading-root {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        z-index: 9999;
        transition: opacity 0.5s ease;
      }
      #loading-root.hidden {
        opacity: 0;
        pointer-events: none;
      }
      .loading-card {
        background: rgba(255,255,255,0.95);
        padding: 40px 60px;
        border-radius: 20px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        text-align: center;
        max-width: 400px;
        width: 90%;
      }
      .loading-spinner {
        width: 50px;
        height: 50px;
        border: 4px solid #e2e8f0;
        border-top-color: #667eea;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        margin: 0 auto 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loading-title {
        font-size: 1.25rem;
        font-weight: 700;
        color: #1e293b;
        margin: 0 0 8px;
      }
      .loading-subtitle {
        font-size: 0.875rem;
        color: #64748b;
        margin: 0 0 24px;
      }
      .loading-progress {
        width: 100%;
        height: 6px;
        background: #e2e8f0;
        border-radius: 3px;
        overflow: hidden;
      }
      .loading-progress-bar {
        height: 100%;
        width: 0%;
        background: linear-gradient(90deg, #667eea, #764ba2);
        border-radius: 3px;
        animation: progress 2s ease-in-out forwards;
      }
      @keyframes progress {
        0% { width: 0%; }
        50% { width: 60%; }
        100% { width: 100%; }
      }
      /* Hide skeleton once React mounts */
      #root:not(:empty) ~ #loading-root {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <div id="loading-root">
      <div class="loading-card">
        <div class="loading-spinner"></div>
        <p class="loading-title">Loading Tech Tutorials</p>
        <p class="loading-subtitle">Preparing your learning experience...</p>
        <div class="loading-progress">
          <div class="loading-progress-bar"></div>
        </div>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
